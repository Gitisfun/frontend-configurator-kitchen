<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#f5f1ec"/>
  <!-- Cabinet body -->
  <rect x="55" y="10" width="90" height="175" rx="2" fill="#ebe6de" stroke="#b5ad9e" stroke-width="1.2"/>
