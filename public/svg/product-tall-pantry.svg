<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#f5f1ec"/>
  <!-- Floor line -->
  <line x1="0" y1="378" x2="600" y2="378" stroke="#e0dbd3" stroke-width="1"/>

  <!-- Cabinet body -->
  <rect x="210" y="18" width="180" height="350" rx="2" fill="#ebe6de" stroke="#b5ad9e" stroke-width="1.5"/>

  <!-- Top door -->
  <rect x="222" y="26" width="156" height="166" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Top door handle -->
  <rect x="363" y="90" width="5" height="36" rx="2.5" fill="#8a8278"/>

  <!-- Bottom door -->
  <rect x="222" y="198" width="156" height="162" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Bottom door handle -->
  <rect x="363" y="260" width="5" height="36" rx="2.5" fill="#8a8278"/>

  <!-- Visible shelves through door outlines (dashed) -->
  <line x1="228" y1="80" x2="372" y2="80" stroke="#d1cbc2" stroke-width="0.7" stroke-dasharray="3 2"/>
  <line x1="228" y1="130" x2="372" y2="130" stroke="#d1cbc2" stroke-width="0.7" stroke-dasharray="3 2"/>
  <line x1="228" y1="248" x2="372" y2="248" stroke="#d1cbc2" stroke-width="0.7" stroke-dasharray="3 2"/>
  <line x1="228" y1="300" x2="372" y2="300" stroke="#d1cbc2" stroke-width="0.7" stroke-dasharray="3 2"/>

  <!-- Plinth -->
  <rect x="214" y="368" width="172" height="12" rx="1" fill="#d5cfc5" stroke="#b5ad9e" stroke-width="0.8"/>

  <!-- Legs -->
  <rect x="226" y="380" width="10" height="10" rx="2" fill="#a09688"/>
  <rect x="364" y="380" width="10" height="10" rx="2" fill="#a09688"/>

  <!-- Dimension: height -->
  <line x1="420" y1="18" x2="420" y2="378" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="416" y1="18" x2="424" y2="18" stroke="#a09688" stroke-width="0.8"/>
  <line x1="416" y1="378" x2="424" y2="378" stroke="#a09688" stroke-width="0.8"/>
  <text x="436" y="204" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#8a8278" transform="rotate(90 436 204)">200 cm</text>

  <!-- Dimension: width -->
  <line x1="210" y1="396" x2="390" y2="396" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="210" y1="392" x2="210" y2="400" stroke="#a09688" stroke-width="0.8"/>
  <line x1="390" y1="392" x2="390" y2="400" stroke="#a09688" stroke-width="0.8"/>
  <text x="300" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8a8278">60 cm</text>

  <!-- Decorative: slight 3D perspective -->
  <path d="M390 18 L408 8 L408 370 L390 368" fill="#e0dbd3" stroke="#b5ad9e" stroke-width="0.8" opacity="0.5"/>
</svg>
