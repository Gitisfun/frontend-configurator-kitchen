<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Cabinet door hint -->
  <rect x="60" y="40" width="280" height="220" rx="3" fill="#e8e3da" stroke="#d1cbc2" stroke-width="1"/>
  <!-- Knob shadow -->
  <ellipse cx="202" cy="154" rx="22" ry="6" fill="#d1cbc2" opacity="0.5"/>
  <!-- Knob base plate -->
  <circle cx="200" cy="148" r="20" fill="#c2b8aa" stroke="#a09688" stroke-width="1.5"/>
  <!-- Knob top -->
  <circle cx="200" cy="144" r="14" fill="#b5ad9e" stroke="#8a8278" stroke-width="1.2"/>
  <!-- Highlight -->
  <ellipse cx="195" cy="140" rx="6" ry="4" fill="#ccc6bc" opacity="0.7"/>
  <!-- Mounting screw hint -->
  <circle cx="200" cy="144" r="2.5" fill="#8a8278"/>
</svg>
