<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Wall mounting line -->
  <line x1="80" y1="42" x2="320" y2="42" stroke="#d5cfc5" stroke-width="1" stroke-dasharray="6 4"/>
  <!-- Cabinet body -->
  <rect x="110" y="50" width="180" height="200" rx="2" fill="#ebe6de" stroke="#b5ad9e" stroke-width="1.5"/>
  <!-- Single door -->
  <rect x="120" y="58" width="160" height="184" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Handle -->
  <rect x="264" y="130" width="6" height="40" rx="3" fill="#8a8278"/>
  <!-- Shelf lines (visible through subtle indication) -->
  <line x1="128" y1="130" x2="272" y2="130" stroke="#d1cbc2" stroke-width="0.8" stroke-dasharray="3 2"/>
  <line x1="128" y1="185" x2="272" y2="185" stroke="#d1cbc2" stroke-width="0.8" stroke-dasharray="3 2"/>
  <!-- Dimension label -->
  <line x1="110" y1="268" x2="290" y2="268" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="110" y1="264" x2="110" y2="272" stroke="#a09688" stroke-width="0.8"/>
  <line x1="290" y1="264" x2="290" y2="272" stroke="#a09688" stroke-width="0.8"/>
  <text x="200" y="282" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8a8278">60 cm</text>
</svg>
