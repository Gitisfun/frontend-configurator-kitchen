<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Pull-out basket top-left -->
  <rect x="55" y="45" width="130" height="95" rx="6" fill="#e8e3da" stroke="#b5ad9e" stroke-width="1.5"/>
  <rect x="78" y="62" width="84" height="48" rx="3" fill="none" stroke="#a09688" stroke-width="1.2"/>
  <line x1="78" y1="78" x2="162" y2="78" stroke="#b5ad9e" stroke-width="0.8"/>
  <line x1="78" y1="94" x2="162" y2="94" stroke="#b5ad9e" stroke-width="0.8"/>
  <rect x="108" y="56" width="24" height="6" rx="2" fill="#a09688"/>
  <text x="120" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Uittrekmand</text>

  <!-- Internal drawers top-right -->
  <rect x="215" y="45" width="130" height="95" rx="6" fill="#e8e3da" stroke="#b5ad9e" stroke-width="1.5"/>
  <rect x="238" y="60" width="84" height="20" rx="2" fill="#e3ddd3" stroke="#a09688" stroke-width="1"/>
  <rect x="268" y="66" width="24" height="5" rx="2" fill="#8a8278"/>
  <rect x="238" y="86" width="84" height="20" rx="2" fill="#e3ddd3" stroke="#a09688" stroke-width="1"/>
  <rect x="268" y="92" width="24" height="5" rx="2" fill="#8a8278"/>
  <rect x="238" y="112" width="84" height="16" rx="2" fill="#d5cfc5" stroke="#a09688" stroke-width="0.8"/>
  <text x="280" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Interne lades</text>

  <!-- Carousel bottom-left -->
  <rect x="55" y="160" width="130" height="95" rx="6" fill="#e8e3da" stroke="#b5ad9e" stroke-width="1.5"/>
  <circle cx="120" cy="200" r="30" fill="none" stroke="#b5ad9e" stroke-width="1"/>
  <circle cx="120" cy="200" r="18" fill="none" stroke="#c2b8aa" stroke-width="0.8"/>
  <circle cx="120" cy="200" r="4" fill="#a09688"/>
  <line x1="120" y1="196" x2="120" y2="170" stroke="#b5ad9e" stroke-width="1"/>
  <text x="120" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Carrousel</text>

  <!-- Door organizer bottom-right -->
  <rect x="215" y="160" width="130" height="95" rx="6" fill="#e8e3da" stroke="#b5ad9e" stroke-width="1.5"/>
  <rect x="240" y="174" width="80" height="62" rx="2" fill="#e3ddd3" stroke="#a09688" stroke-width="1"/>
  <rect x="248" y="182" width="28" height="22" rx="1" fill="none" stroke="#b5ad9e" stroke-width="0.8"/>
  <rect x="280" y="182" width="28" height="22" rx="1" fill="none" stroke="#b5ad9e" stroke-width="0.8"/>
  <rect x="248" y="210" width="60" height="18" rx="1" fill="none" stroke="#b5ad9e" stroke-width="0.8"/>
  <text x="280" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Deurorganizer</text>
</svg>
