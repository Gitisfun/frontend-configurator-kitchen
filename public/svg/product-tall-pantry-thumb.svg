<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#f5f1ec"/>
  <!-- Cabinet body -->
  <rect x="55" y="6" width="90" height="178" rx="2" fill="#ebe6de" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Top door -->
  <rect x="62" y="12" width="76" height="82" rx="1.5" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1"/>
  <rect x="130" y="40" width="3" height="20" rx="1.5" fill="#8a8278"/>
  <!-- Shelves (dashed) -->
  <line x1="66" y1="42" x2="134" y2="42" stroke="#d1cbc2" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="66" y1="68" x2="134" y2="68" stroke="#d1cbc2" stroke-width="0.5" stroke-dasharray="2 2"/>
  <!-- Bottom door -->
  <rect x="62" y="98" width="76" height="80" rx="1.5" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1"/>
  <rect x="130" y="126" width="3" height="20" rx="1.5" fill="#8a8278"/>
  <!-- Shelves (dashed) -->
  <line x1="66" y1="128" x2="134" y2="128" stroke="#d1cbc2" stroke-width="0.5" stroke-dasharray="2 2"/>
  <line x1="66" y1="154" x2="134" y2="154" stroke="#d1cbc2" stroke-width="0.5" stroke-dasharray="2 2"/>
  <!-- Plinth -->
  <rect x="58" y="184" width="84" height="6" rx="1" fill="#d5cfc5" stroke="#b5ad9e" stroke-width="0.6"/>
  <!-- Legs -->
  <rect x="66" y="190" width="5" height="6" rx="1" fill="#a09688"/>
  <rect x="128" y="190" width="5" height="6" rx="1" fill="#a09688"/>
</svg>
