<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Mounting bracket left -->
  <rect x="55" y="55" width="130" height="85" rx="6" fill="#e8e3da" stroke="#b5ad9e" stroke-width="1.5"/>
  <rect x="80" y="72" width="40" height="48" rx="2" fill="#d5cfc5" stroke="#a09688" stroke-width="1"/>
  <rect x="80" y="72" width="40" height="8" rx="1" fill="#c2b8aa"/>
  <circle cx="100" cy="100" r="3" fill="#a09688"/>
  <rect x="128" y="80" width="38" height="4" rx="2" fill="#a09688"/>
  <rect x="128" y="92" width="38" height="4" rx="2" fill="#a09688"/>
  <rect x="128" y="104" width="38" height="4" rx="2" fill="#a09688"/>
  <text x="120" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Ophangrail</text>

  <!-- Lighting right -->
  <rect x="215" y="55" width="130" height="85" rx="6" fill="#e8e3da" stroke="#b5ad9e" stroke-width="1.5"/>
  <rect x="240" y="72" width="80" height="6" rx="3" fill="#d4c98b" stroke="#bfb56a" stroke-width="0.8"/>
  <rect x="240" y="86" width="80" height="6" rx="3" fill="#ddd5a0" stroke="#bfb56a" stroke-width="0.8" opacity="0.6"/>
  <line x1="280" y1="68" x2="280" y2="72" stroke="#bfb56a" stroke-width="1"/>
  <circle cx="280" cy="66" r="2" fill="#d4c98b"/>
  <rect x="252" y="100" width="56" height="10" rx="2" fill="#d5cfc5" stroke="#a09688" stroke-width="0.8"/>
  <text x="280" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Verlichting</text>

  <!-- Shelf support bottom-left -->
  <rect x="55" y="165" width="130" height="85" rx="6" fill="#e8e3da" stroke="#b5ad9e" stroke-width="1.5"/>
  <rect x="78" y="180" width="84" height="6" rx="1" fill="#c2b8aa" stroke="#a09688" stroke-width="0.8"/>
  <rect x="78" y="194" width="84" height="6" rx="1" fill="#d5cfc5" stroke="#a09688" stroke-width="0.8"/>
  <circle cx="82" cy="210" r="3.5" fill="#c2b8aa" stroke="#a09688" stroke-width="0.8"/>
  <circle cx="96" cy="210" r="3.5" fill="#c2b8aa" stroke="#a09688" stroke-width="0.8"/>
  <circle cx="110" cy="210" r="3.5" fill="#c2b8aa" stroke="#a09688" stroke-width="0.8"/>
  <circle cx="124" cy="210" r="3.5" fill="#c2b8aa" stroke="#a09688" stroke-width="0.8"/>
  <text x="120" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Planken</text>

  <!-- Glass insert bottom-right -->
  <rect x="215" y="165" width="130" height="85" rx="6" fill="#e8e3da" stroke="#b5ad9e" stroke-width="1.5"/>
  <rect x="250" y="178" width="60" height="50" rx="2" fill="#e8edf0" stroke="#b5ad9e" stroke-width="1" opacity="0.7"/>
  <line x1="250" y1="200" x2="310" y2="200" stroke="#c8d0d5" stroke-width="0.6"/>
  <line x1="280" y1="178" x2="280" y2="228" stroke="#c8d0d5" stroke-width="0.6"/>
  <text x="280" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Glasdeur</text>
</svg>
