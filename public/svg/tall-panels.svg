<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Side panel (left) -->
  <rect x="80" y="30" width="60" height="240" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.5"/>
  <!-- Wood grain lines -->
  <line x1="92" y1="40" x2="94" y2="260" stroke="#d5cfc5" stroke-width="0.8"/>
  <line x1="108" y1="35" x2="106" y2="265" stroke="#d5cfc5" stroke-width="0.8"/>
  <line x1="122" y1="38" x2="124" y2="262" stroke="#d5cfc5" stroke-width="0.8"/>
  <text x="110" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Zijpaneel</text>

  <!-- Filler panel (center) -->
  <rect x="170" y="30" width="30" height="240" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.5"/>
  <line x1="180" y1="40" x2="181" y2="260" stroke="#d5cfc5" stroke-width="0.8"/>
  <line x1="190" y1="35" x2="189" y2="265" stroke="#d5cfc5" stroke-width="0.8"/>
  <text x="185" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Vulstrip</text>

  <!-- Cover panel (right) -->
  <rect x="230" y="30" width="90" height="240" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.5"/>
  <line x1="248" y1="40" x2="250" y2="260" stroke="#d5cfc5" stroke-width="0.8"/>
  <line x1="270" y1="35" x2="268" y2="265" stroke="#d5cfc5" stroke-width="0.8"/>
  <line x1="292" y1="38" x2="294" y2="262" stroke="#d5cfc5" stroke-width="0.8"/>
  <!-- Decorative edge detail -->
  <line x1="230" y1="30" x2="230" y2="270" stroke="#b5ad9e" stroke-width="2"/>
  <text x="275" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a8278">Afwerkpaneel</text>
</svg>
