<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Cabinet door hint -->
  <rect x="60" y="40" width="280" height="220" rx="3" fill="#e8e3da" stroke="#d1cbc2" stroke-width="1"/>
  <!-- Rail shadow -->
  <rect x="92" y="156" width="220" height="5" rx="2.5" fill="#d1cbc2" opacity="0.35"/>
  <!-- Left mounting bracket -->
  <path d="M100 148 L100 134 L112 134 L112 148" fill="#8a8278" stroke="#6b6359" stroke-width="1.2"/>
  <!-- Right mounting bracket -->
  <path d="M288 148 L288 134 L300 134 L300 148" fill="#8a8278" stroke="#6b6359" stroke-width="1.2"/>
  <!-- Long rail bar -->
  <rect x="96" y="126" width="208" height="10" rx="2" fill="#7a7268" stroke="#5e564e" stroke-width="1.3"/>
  <!-- Top edge highlight -->
  <rect x="110" y="127" width="180" height="2.5" rx="1" fill="#9a9389" opacity="0.5"/>
  <!-- Bottom edge shadow -->
  <rect x="110" y="133" width="180" height="1.5" rx="0.75" fill="#5e564e" opacity="0.2"/>
  <!-- Screw details on brackets -->
  <circle cx="106" cy="140" r="1.8" fill="#5e564e"/>
  <circle cx="294" cy="140" r="1.8" fill="#5e564e"/>
</svg>
