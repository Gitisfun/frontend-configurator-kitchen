  <circle cx="280" cy="240" r="30" fill="none" stroke="#d1cbc2" stroke-width="0.7" stroke-dasharray="3 2" opacity="0.4"/>
  <circle cx="280" cy="240" r="4" fill="#d1cbc2" opacity="0.5"/>

  <!-- Dimension: width -->
  <line x1="120" y1="380" x2="460" y2="380" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="120" y1="376" x2="120" y2="384" stroke="#a09688" stroke-width="0.8"/>
  <line x1="460" y1="376" x2="460" y2="384" stroke="#a09688" stroke-width="0.8"/>
  <text x="290" y="394" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8a8278">90 &#215; 90 cm</text>
