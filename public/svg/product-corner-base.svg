  <!-- Right handle -->
  <path d="M302 210 L302 246 L306 245.7 L306 209.7 Z" fill="#8a8278"/>

  <!-- Corner join line -->
  <line x1="280" y1="108" x2="280" y2="346" stroke="#b5ad9e" stroke-width="1.5"/>

  <!-- Plinth left -->
  <path d="M124 330 L280 346 L280 352 L124 336 Z" fill="#d5cfc5" stroke="#b5ad9e" stroke-width="0.8"/>
  <!-- Plinth right -->
  <path d="M280 346 L456 330 L456 336 L280 352 Z" fill="#d5cfc5" stroke="#b5ad9e" stroke-width="0.8"/>

  <!-- Carousel hint -->
