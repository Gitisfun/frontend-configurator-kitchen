<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Cabinet door hint -->
  <rect x="60" y="40" width="280" height="220" rx="3" fill="#e8e3da" stroke="#d1cbc2" stroke-width="1"/>
  <!-- Knob shadow -->
  <ellipse cx="202" cy="158" rx="24" ry="6" fill="#d1cbc2" opacity="0.5"/>
  <!-- Polished knob base ring -->
  <circle cx="200" cy="148" r="22" fill="#c0c5ca" stroke="#8a9098" stroke-width="1.5"/>
  <!-- Polished knob dome -->
  <circle cx="200" cy="145" r="16" fill="#d0d4d8" stroke="#9aa0a6" stroke-width="1"/>
  <!-- Strong chrome highlights -->
  <ellipse cx="194" cy="139" rx="8" ry="6" fill="#e8ebed" opacity="0.7"/>
  <ellipse cx="192" cy="137" rx="4" ry="3" fill="#f0f2f4" opacity="0.8"/>
  <!-- Reflection arc -->
  <path d="M208 152 Q214 146 210 138" fill="none" stroke="#e0e3e6" stroke-width="1" opacity="0.5"/>
</svg>
