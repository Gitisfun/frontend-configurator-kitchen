<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Cabinet body (tall) -->
  <rect x="130" y="20" width="140" height="254" rx="2" fill="#ebe6de" stroke="#b5ad9e" stroke-width="1.5"/>
  <!-- Top door -->
  <rect x="140" y="28" width="120" height="118" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Bottom door -->
  <rect x="140" y="152" width="120" height="114" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Top handle -->
  <rect x="246" y="70" width="5" height="32" rx="2.5" fill="#8a8278"/>
  <!-- Bottom handle -->
  <rect x="246" y="194" width="5" height="32" rx="2.5" fill="#8a8278"/>
  <!-- Plinth -->
  <rect x="133" y="274" width="134" height="10" rx="1" fill="#d5cfc5" stroke="#b5ad9e" stroke-width="0.8"/>
  <!-- Height dimension -->
  <line x1="290" y1="20" x2="290" y2="284" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="286" y1="20" x2="294" y2="20" stroke="#a09688" stroke-width="0.8"/>
  <line x1="286" y1="284" x2="294" y2="284" stroke="#a09688" stroke-width="0.8"/>
  <text x="305" y="156" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#8a8278" transform="rotate(90 305 156)">207.8 cm</text>
</svg>
