<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Cabinet door hint -->
  <rect x="60" y="40" width="280" height="220" rx="3" fill="#e8e3da" stroke="#d1cbc2" stroke-width="1"/>
  <!-- Handle shadow -->
  <rect x="122" y="154" width="160" height="6" rx="3" fill="#d1cbc2" opacity="0.4"/>
  <!-- Left mounting post -->
  <rect x="128" y="132" width="10" height="18" rx="2" fill="#b89b5a" stroke="#9a7f42" stroke-width="1"/>
  <!-- Right mounting post -->
  <rect x="262" y="132" width="10" height="18" rx="2" fill="#b89b5a" stroke="#9a7f42" stroke-width="1"/>
  <!-- Bar -->
  <rect x="126" y="126" width="148" height="10" rx="5" fill="#c4a96a" stroke="#9a7f42" stroke-width="1.3"/>
  <!-- Highlight streak on bar -->
  <rect x="140" y="128" width="100" height="3" rx="1.5" fill="#d8c48a" opacity="0.6"/>
  <!-- Left end cap -->
  <circle cx="131" cy="131" r="5" fill="#c4a96a" stroke="#9a7f42" stroke-width="1"/>
  <!-- Right end cap -->
  <circle cx="269" cy="131" r="5" fill="#c4a96a" stroke="#9a7f42" stroke-width="1"/>
</svg>
