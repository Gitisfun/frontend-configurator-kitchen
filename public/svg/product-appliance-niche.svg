<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#f5f1ec"/>
  <!-- Floor line -->
  <line x1="0" y1="370" x2="600" y2="370" stroke="#e0dbd3" stroke-width="1"/>

  <!-- Cabinet body -->
  <rect x="190" y="30" width="160" height="330" rx="2" fill="#ebe6de" stroke="#b5ad9e" stroke-width="1.5"/>

  <!-- Top door (small, above niche) -->
  <rect x="200" y="38" width="140" height="60" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Top door handle -->
  <rect x="326" y="56" width="5" height="24" rx="2.5" fill="#8a8278"/>

  <!-- Appliance niche (fridge/freezer space) -->
  <rect x="200" y="104" width="140" height="178" rx="2" fill="#d8d2c8" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Niche inner shadow -->
  <rect x="204" y="108" width="132" height="170" rx="1" fill="#cec7bb" opacity="0.6"/>
  <!-- Appliance silhouette (integrated fridge) -->
  <rect x="210" y="112" width="120" height="162" rx="3" fill="#e0dbd3" stroke="#c2b8aa" stroke-width="1"/>
  <!-- Fridge handle line -->
  <rect x="316" y="150" width="4" height="50" rx="2" fill="#b5ad9e"/>
  <!-- Fridge separator line -->
  <line x1="214" y1="210" x2="326" y2="210" stroke="#c2b8aa" stroke-width="0.8"/>
  <!-- Fridge brand area -->
  <rect x="250" y="154" width="30" height="6" rx="2" fill="#c2b8aa" opacity="0.5"/>

  <!-- Bottom door -->
  <rect x="200" y="288" width="140" height="68" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Bottom door handle -->
  <rect x="326" y="306" width="5" height="24" rx="2.5" fill="#8a8278"/>

  <!-- Plinth -->
  <rect x="193" y="358" width="154" height="12" rx="1" fill="#d5cfc5" stroke="#b5ad9e" stroke-width="0.8"/>

  <!-- Dimension arrows: height -->
  <line x1="380" y1="30" x2="380" y2="370" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="376" y1="30" x2="384" y2="30" stroke="#a09688" stroke-width="0.8"/>
  <line x1="376" y1="370" x2="384" y2="370" stroke="#a09688" stroke-width="0.8"/>
  <text x="396" y="206" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#8a8278" transform="rotate(90 396 206)">207.8 cm</text>

  <!-- Dimension arrows: niche height -->
  <line x1="160" y1="104" x2="160" y2="282" stroke="#a09688" stroke-width="0.6" stroke-dasharray="3 2"/>
  <line x1="156" y1="104" x2="164" y2="104" stroke="#a09688" stroke-width="0.6"/>
  <line x1="156" y1="282" x2="164" y2="282" stroke="#a09688" stroke-width="0.6"/>
  <text x="148" y="198" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#a09688" transform="rotate(-90 148 198)">178 cm</text>

  <!-- Width dimension -->
  <line x1="190" y1="386" x2="350" y2="386" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="190" y1="382" x2="190" y2="390" stroke="#a09688" stroke-width="0.8"/>
  <line x1="350" y1="382" x2="350" y2="390" stroke="#a09688" stroke-width="0.8"/>
  <text x="270" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8a8278">60 cm</text>
</svg>
