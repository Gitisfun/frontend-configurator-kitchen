<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Cabinet door hint -->
  <rect x="60" y="40" width="280" height="220" rx="3" fill="#e8e3da" stroke="#d1cbc2" stroke-width="1"/>
  <!-- Handle shadow -->
  <ellipse cx="202" cy="155" rx="50" ry="5" fill="#d1cbc2" opacity="0.4"/>
  <!-- Left mounting post -->
  <rect x="155" y="134" width="8" height="16" rx="2" fill="#7a7268" stroke="#5e564e" stroke-width="1"/>
  <!-- Right mounting post -->
  <rect x="237" y="134" width="8" height="16" rx="2" fill="#7a7268" stroke="#5e564e" stroke-width="1"/>
  <!-- Oval bar profile -->
  <rect x="150" y="122" width="100" height="16" rx="8" fill="#8a8278" stroke="#6b6359" stroke-width="1.3"/>
  <!-- Matte surface - subtle noise via lines -->
  <line x1="162" y1="128" x2="238" y2="128" stroke="#7a7268" stroke-width="0.4" opacity="0.5"/>
  <line x1="160" y1="132" x2="240" y2="132" stroke="#7a7268" stroke-width="0.4" opacity="0.5"/>
  <!-- Subtle top highlight -->
  <rect x="168" y="124" width="64" height="3" rx="1.5" fill="#9a9389" opacity="0.5"/>
</svg>
