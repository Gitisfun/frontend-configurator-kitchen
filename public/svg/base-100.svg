<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Counter top -->
  <rect x="50" y="60" width="300" height="14" rx="2" fill="#c2b8aa" stroke="#a09688" stroke-width="1.5"/>
  <!-- Cabinet body -->
  <rect x="55" y="74" width="290" height="170" rx="2" fill="#ebe6de" stroke="#b5ad9e" stroke-width="1.5"/>
  <!-- Top drawer -->
  <rect x="65" y="82" width="270" height="44" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Drawer handle -->
  <rect x="165" y="100" width="70" height="5" rx="2.5" fill="#8a8278"/>
  <!-- Left door -->
  <rect x="65" y="132" width="130" height="104" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Right door -->
  <rect x="200" y="132" width="135" height="104" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Left handle -->
  <rect x="180" y="168" width="6" height="36" rx="3" fill="#8a8278"/>
  <!-- Right handle -->
  <rect x="210" y="168" width="6" height="36" rx="3" fill="#8a8278"/>
  <!-- Plinth -->
  <rect x="58" y="250" width="284" height="16" rx="1" fill="#d5cfc5" stroke="#b5ad9e" stroke-width="1"/>
  <!-- Legs -->
  <rect x="72" y="266" width="8" height="14" rx="1" fill="#a09688"/>
  <rect x="322" y="266" width="8" height="14" rx="1" fill="#a09688"/>
  <!-- Dimension label -->
  <line x1="55" y1="290" x2="345" y2="290" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="55" y1="286" x2="55" y2="294" stroke="#a09688" stroke-width="0.8"/>
  <line x1="345" y1="286" x2="345" y2="294" stroke="#a09688" stroke-width="0.8"/>
  <text x="200" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8a8278">100 cm</text>
</svg>
