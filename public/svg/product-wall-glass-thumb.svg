<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" fill="#f5f1ec"/>
  <!-- Wall line -->
  <line x1="40" y1="22" x2="160" y2="22" stroke="#d5cfc5" stroke-width="0.8" stroke-dasharray="4 3"/>
  <!-- Cabinet body -->
  <rect x="50" y="26" width="100" height="150" rx="2" fill="#ebe6de" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Glass door -->
  <rect x="58" y="32" width="84" height="138" rx="1.5" fill="#e8ecef" stroke="#b5ad9e" stroke-width="1" opacity="0.85"/>
  <!-- Glass reflection -->
  <path d="M62 34 L72 32 L72 168 L62 170 Z" fill="#f0f3f5" opacity="0.3"/>
  <!-- Shelves -->
  <line x1="62" y1="82" x2="138" y2="82" stroke="#c2b8aa" stroke-width="0.8" opacity="0.7"/>
  <line x1="62" y1="126" x2="138" y2="126" stroke="#c2b8aa" stroke-width="0.8" opacity="0.7"/>
  <!-- Items on shelves -->
  <rect x="74" y="66" width="12" height="14" rx="1" fill="#d5cfc5" opacity="0.5"/>
  <rect x="92" y="68" width="12" height="12" rx="1" fill="#d0cbc3" opacity="0.5"/>
  <rect x="80" y="112" width="14" height="12" rx="1" fill="#d5cfc5" opacity="0.4"/>
  <!-- Handle -->
  <rect x="134" y="86" width="3" height="22" rx="1.5" fill="#8a8278"/>
</svg>
