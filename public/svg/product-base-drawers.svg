<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#f5f1ec"/>
  <!-- Floor line -->
  <line x1="0" y1="360" x2="600" y2="360" stroke="#e0dbd3" stroke-width="1"/>

  <!-- Countertop with stone texture feel -->
  <rect x="140" y="110" width="320" height="18" rx="2" fill="#c2b8aa" stroke="#a09688" stroke-width="1.5"/>
  <!-- Counter edge highlight -->
  <rect x="144" y="112" width="312" height="4" rx="1" fill="#cec7bb" opacity="0.5"/>

  <!-- Cabinet body -->
  <rect x="148" y="128" width="304" height="210" rx="2" fill="#ebe6de" stroke="#b5ad9e" stroke-width="1.5"/>

  <!-- Top drawer -->
  <rect x="160" y="136" width="280" height="90" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Top drawer handle -->
  <rect x="264" y="174" width="72" height="6" rx="3" fill="#8a8278"/>
  <!-- Top drawer shadow line -->
  <line x1="168" y1="170" x2="432" y2="170" stroke="#d5cfc5" stroke-width="0.5"/>

  <!-- Bottom drawer -->
  <rect x="160" y="232" width="280" height="98" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Bottom drawer handle -->
  <rect x="264" y="274" width="72" height="6" rx="3" fill="#8a8278"/>
  <!-- Bottom drawer shadow line -->
  <line x1="168" y1="270" x2="432" y2="270" stroke="#d5cfc5" stroke-width="0.5"/>

  <!-- Plinth -->
  <rect x="152" y="340" width="296" height="16" rx="1" fill="#d5cfc5" stroke="#b5ad9e" stroke-width="0.8"/>

  <!-- Legs -->
  <rect x="168" y="356" width="10" height="14" rx="2" fill="#a09688"/>
  <rect x="422" y="356" width="10" height="14" rx="2" fill="#a09688"/>

  <!-- Dimension: width -->
  <line x1="148" y1="386" x2="452" y2="386" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="148" y1="382" x2="148" y2="390" stroke="#a09688" stroke-width="0.8"/>
  <line x1="452" y1="382" x2="452" y2="390" stroke="#a09688" stroke-width="0.8"/>
  <text x="300" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8a8278">80 cm</text>

  <!-- Dimension: height -->
  <line x1="490" y1="128" x2="490" y2="356" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="486" y1="128" x2="494" y2="128" stroke="#a09688" stroke-width="0.8"/>
  <line x1="486" y1="356" x2="494" y2="356" stroke="#a09688" stroke-width="0.8"/>
  <text x="506" y="248" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#8a8278" transform="rotate(90 506 248)">72 cm</text>

  <!-- Decorative: slight 3D side panel edge -->
  <path d="M452 128 L472 114 L472 342 L452 356" fill="#e0dbd3" stroke="#b5ad9e" stroke-width="1" opacity="0.5"/>
</svg>
