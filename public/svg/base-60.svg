<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f5f1ec"/>
  <!-- Counter top -->
  <rect x="100" y="60" width="200" height="14" rx="2" fill="#c2b8aa" stroke="#a09688" stroke-width="1.5"/>
  <!-- Cabinet body -->
  <rect x="105" y="74" width="190" height="170" rx="2" fill="#ebe6de" stroke="#b5ad9e" stroke-width="1.5"/>
  <!-- Single door -->
  <rect x="115" y="82" width="170" height="154" rx="2" fill="#e3ddd3" stroke="#b5ad9e" stroke-width="1.2"/>
  <!-- Handle -->
  <rect x="270" y="140" width="6" height="40" rx="3" fill="#8a8278"/>
  <!-- Plinth -->
  <rect x="108" y="250" width="184" height="16" rx="1" fill="#d5cfc5" stroke="#b5ad9e" stroke-width="1"/>
  <!-- Legs -->
  <rect x="120" y="266" width="8" height="14" rx="1" fill="#a09688"/>
  <rect x="272" y="266" width="8" height="14" rx="1" fill="#a09688"/>
  <!-- Dimension label -->
  <line x1="105" y1="290" x2="295" y2="290" stroke="#a09688" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="105" y1="286" x2="105" y2="294" stroke="#a09688" stroke-width="0.8"/>
  <line x1="295" y1="286" x2="295" y2="294" stroke="#a09688" stroke-width="0.8"/>
  <text x="200" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8a8278">60 cm</text>
</svg>
